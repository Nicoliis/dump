<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Pose Human • Three.js</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #111;
            font-family: system-ui, sans-serif;
        }
        canvas { display: block; }
        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 15px 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            user-select: none;
            z-index: 100;
        }
        button {
            margin-top: 10px;
            padding: 10px 18px;
            background: #ff4d4d;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #ff6666; }
        .info {
            font-size: 0.9em;
            opacity: 0.8;
            margin-top: 8px;
        }

        /* Right-hand parameter sidebar */
        .sidebar {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 240px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 16px 18px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            user-select: none;
            z-index: 100;
            box-sizing: border-box;
        }
        .sidebar h3 {
            margin: 0 0 12px;
            font-size: 1.05em;
        }
        .sidebar .row { margin-bottom: 14px; }
        .sidebar .row-head {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            margin-bottom: 5px;
        }
        .sidebar .val {
            opacity: 0.7;
            font-variant-numeric: tabular-nums;
        }
        .sidebar input[type=range] {
            width: 100%;
            accent-color: #ff4d4d;
            cursor: pointer;
        }
    </style>
    <!-- Nicotols login gate -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../shared/config.js"></script>
    <script src="../../shared/auth.js"></script>
    <script src="../../shared/auth-gate.js"></script>
    <script>AuthGate.protect();</script>
</head>
<body>
    <div class="ui">
        <h2>Random Human Pose</h2>
        <button id="randomize">New Random Pose + Camera</button>
        <div class="info">
            Drag to orbit • Scroll to zoom<br>
            Anime-style figure
        </div>
    </div>

    <!-- Three.js (global build) + OrbitControls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>

    <!-- App modules. ORDER MATTERS: config first, main last. -->
    <script src="js/config.js"></script>
    <script src="js/style.js"></script>
    <script src="js/scene.js"></script>
    <script src="js/human.js"></script>
    <script src="js/figures.js"></script>
    <script src="js/pose.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
