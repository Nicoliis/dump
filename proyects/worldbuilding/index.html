<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StoryForge</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236366f1' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z'/%3E%3Cpath d='M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/base.css?v=2">
  <link rel="stylesheet" href="css/layout.css?v=2">
  <link rel="stylesheet" href="css/components.css?v=2">
  <link rel="stylesheet" href="css/social.css?v=9">

	<!-- Nicotols login gate -->
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	<script src="../../shared/config.js?v=2"></script>
	<script src="../../shared/storage.js?v=2"></script>
	<script src="../../shared/auth.js?v=2"></script>
	<script src="../../shared/auth-gate.js?v=2"></script>
	<script>AuthGate.protect();</script>
</head>
<body class="mode-social">
  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
  <aside class="sidebar">
    <div class="logo">StoryForge</div>
    <nav class="menu" id="menu"></nav>
    <div class="new-group" id="btn-new-group">+ New Group</div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="icon-btn hamburger" id="nav-toggle" data-icon="menu" aria-label="Menu"></button>
        <button class="brand" id="brand"><span class="brand-mark" data-icon="book"></span> StoryForge</button>
        <span class="breadcrumb" id="breadcrumb"></span>
        <input class="search" id="search-input" type="text" placeholder="Search this world…">
      </div>
      <div class="topbar-right">
        <div class="seg" id="mode-toggle">
          <button class="seg-btn" id="mode-view"><span class="ic" data-icon="view"></span>View</button>
          <button class="seg-btn" id="mode-edit"><span class="ic" data-icon="edit"></span>Edit</button>
        </div>

        <div class="dropdown" id="world-menu-wrap">
          <button class="icon-btn" id="world-menu-btn" data-icon="more" aria-label="World actions"></button>
          <div class="dropdown-panel">
            <button id="btn-world-settings"><span class="ic" data-icon="settings"></span>World settings</button>
            <button id="btn-export"><span class="ic" data-icon="download"></span>Export XML</button>
            <button id="btn-import"><span class="ic" data-icon="upload"></span>Import XML</button>
          </div>
        </div>

        <div class="dropdown" id="notif-wrap">
          <button class="icon-btn" id="notif-btn" data-icon="bell" aria-label="Notifications"></button>
          <span class="notif-count" id="notif-count" style="display:none"></span>
          <div class="dropdown-panel notif-panel" id="notif-panel"></div>
        </div>

        <div class="dropdown" id="user-menu-wrap">
          <button class="user-trigger" id="user-trigger">
            <span class="avatar avatar--initial" id="user-avatar"></span>
            <span class="user-name" id="user-name"></span>
            <span class="caret" data-icon="chevron"></span>
          </button>
          <div class="dropdown-panel">
            <button id="btn-profile"><span class="ic" data-icon="user"></span>My profile</button>
            <button id="btn-signout"><span class="ic" data-icon="logout"></span>Sign out</button>
          </div>
        </div>

        <input type="file" id="import-file" accept=".xml" style="display:none">
      </div>
    </header>
    <main class="content" id="main-content"></main>
  </div>

  <!-- One loader injects all app scripts in order; bump VERSION in loader.js to cache-bust. -->
  <script src="js/loader.js?v=11"></script>
</body>
</html>
