<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StoryForge</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/social.css">
	
	<!-- Nicotols login gate -->
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	<script src="../../shared/config.js"></script>
	<script src="../../shared/storage.js"></script>
	<script src="../../shared/auth.js"></script>
	<script src="../../shared/auth-gate.js"></script>
	<script>AuthGate.protect();</script>
</head>
<body class="mode-social">
  <aside class="sidebar">
    <div class="logo">StoryForge</div>
    <nav class="menu" id="menu"></nav>
    <div class="new-group" id="btn-new-group">+ New Group</div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="brand" id="brand"><span class="brand-mark" data-icon="book"></span> StoryForge</button>
        <span class="breadcrumb" id="breadcrumb"></span>
        <input class="search" id="search-input" type="text" placeholder="Search this world…">
      </div>
      <div class="topbar-right">
        <div class="seg" id="mode-toggle">
          <button class="seg-btn" id="mode-view"><span class="ic" data-icon="view"></span>View</button>
          <button class="seg-btn" id="mode-edit"><span class="ic" data-icon="edit"></span>Edit</button>
        </div>

        <div class="dropdown" id="world-menu-wrap">
          <button class="icon-btn" id="world-menu-btn" data-icon="more" aria-label="World actions"></button>
          <div class="dropdown-panel">
            <button id="btn-world-settings"><span class="ic" data-icon="settings"></span>World settings</button>
            <button id="btn-export"><span class="ic" data-icon="download"></span>Export XML</button>
            <button id="btn-import"><span class="ic" data-icon="upload"></span>Import XML</button>
          </div>
        </div>

        <div class="dropdown" id="user-menu-wrap">
          <button class="user-trigger" id="user-trigger">
            <span class="avatar avatar--initial" id="user-avatar"></span>
            <span class="user-name" id="user-name"></span>
            <span class="caret" data-icon="chevron"></span>
          </button>
          <div class="dropdown-panel">
            <button id="btn-profile"><span class="ic" data-icon="user"></span>My profile</button>
            <button id="btn-signout"><span class="ic" data-icon="logout"></span>Sign out</button>
          </div>
        </div>

        <input type="file" id="import-file" accept=".xml" style="display:none">
      </div>
    </header>
    <main class="content" id="main-content"></main>
  </div>

  <script src="lib/marked.min.js"></script>
  <script src="lib/UI.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/state.js"></script>
  <script src="js/cloud.js"></script>
  <script src="js/data.js"></script>
  <script src="js/xml.js"></script>
  <script src="js/markdown.js"></script>
  <script src="js/components/md-panel.js"></script>
  <script src="js/components/item-card.js"></script>
  <script src="js/components/ref-editor.js"></script>
  <script src="js/components/parent-editor.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/views/gallery.js"></script>
  <script src="js/views/profile.js"></script>
  <script src="js/views/world-settings.js"></script>
  <script src="js/views/home.js"></script>
  <script src="js/views/list.js"></script>
  <script src="js/views/dag.js"></script>
  <script src="js/views/graph.js"></script>
  <script src="js/views/text.js"></script>
  <script src="js/views/detail-actions.js"></script>
  <script src="js/views/detail.js"></script>
  <script src="js/views/new-group.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
